<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherius AI | Real API Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

        :root {
            --accent: #00f2ff;
            --bg-dark: #05050a;
            --panel: rgba(20, 20, 35, 0.8);
        }

        body {
            background-color: var(--bg-dark);
            color: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .code-area {
            font-family: 'Fira Code', monospace;
            background: #0d0d15;
            line-height: 1.6;
        }

        .gemini-text {
            background: linear-gradient(90deg, #4285F4, #A142F4, #E94264);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .copy-success {
            animation: slideUp 0.5s forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .sidebar-item.active {
            border-left: 4px solid var(--accent);
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), transparent);
            color: var(--accent);
        }

        /* Loading animation for the "brain" */
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 242, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }
        .is-generating {
            animation: pulse-cyan 1.5s infinite;
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] hidden">
        <div class="bg-cyan-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border border-cyan-400">
            <i class="fas fa-check-circle"></i>
            <span class="text-sm font-bold uppercase tracking-widest text-[10px]">Copied to Clipboard</span>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-20 md:w-64 glass-panel border-r border-white/5 flex flex-col z-50">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-bolt text-white"></i>
                </div>
                <div class="hidden md:block">
                    <h1 class="font-bold text-sm tracking-tight text-white">AETHERIUS AI</h1>
                    <p class="text-[9px] text-cyan-400 font-bold tracking-widest uppercase">REAL API v1.0</p>
                </div>
            </div>

            <nav class="flex-1 px-4 mt-6 space-y-2">
                <button class="sidebar-item active w-full p-4 rounded-xl flex items-center gap-4 transition-all">
                    <i class="fas fa-brain"></i>
                    <span class="hidden md:block text-sm font-semibold">Gemini Core</span>
                </button>
            </nav>

            <div class="p-6 mt-auto border-t border-white/5 text-center">
                <p class="text-[10px] text-gray-500 mb-1">Powered by</p>
                <span class="gemini-text text-xs">Google Gemini</span>
            </div>
        </aside>

        <!-- CONTENT AREA -->
        <main class="flex-1 flex flex-col relative overflow-hidden">
            
            <header class="h-16 border-b border-white/5 flex items-center justify-between px-8 bg-black/20">
                <div class="flex items-center gap-3">
                    <div id="status-light" class="w-2 h-2 bg-green-500 rounded-full"></div>
                    <span id="status-text" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Neural API: Ready</span>
                </div>
                <button onclick="copyScript()" class="bg-cyan-600 hover:bg-cyan-500 text-white text-[10px] font-bold px-6 py-2.5 rounded-xl transition-all shadow-lg active:scale-95">
                    <i class="fas fa-copy mr-2"></i> COPY SCRIPT
                </button>
            </header>

            <div class="flex-1 flex flex-col md:flex-row p-6 gap-6 overflow-hidden">
                <!-- Inputs -->
                <div class="w-full md:w-80 flex flex-col gap-4">
                    <div class="glass-panel p-6 rounded-3xl border border-white/5 flex flex-col gap-4">
                        <span class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">Request Script</span>
                        <textarea id="promptArea" 
                            class="w-full h-44 bg-transparent border-none text-sm outline-none resize-none placeholder-gray-700 font-medium text-gray-300"
                            placeholder="Minta script apa saja... (Contoh: Bikin GUI admin sederhana atau Script shop koin)"></textarea>
                        <button id="genBtn" onclick="generateWithGemini()" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold text-xs shadow-xl active:scale-95 transition-all">
                            GENERAL NEURAL BUILD
                        </button>
                    </div>

                    <div class="glass-panel p-4 rounded-3xl flex-1 overflow-hidden border border-white/5">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest px-2">Neural Status</p>
                        <div id="logArea" class="space-y-2 overflow-y-auto max-h-48 pr-2 font-mono text-[9px] text-cyan-500/60">
                            <div>> API v2.5-Flash Connected</div>
                            <div>> Waiting for input...</div>
                        </div>
                    </div>
                </div>

                <!-- Editor -->
                <div class="flex-1 glass-panel rounded-3xl overflow-hidden flex flex-col border border-white/10">
                    <div class="bg-black/40 px-6 py-3 border-b border-white/5 flex items-center justify-between">
                        <div class="flex gap-4">
                            <span class="text-xs font-bold text-white uppercase tracking-tighter">Aetherius_Generated.lua</span>
                        </div>
                        <div class="flex gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-red-500/50"></span>
                            <span class="w-2.5 h-2.5 rounded-full bg-yellow-500/50"></span>
                            <span class="w-2.5 h-2.5 rounded-full bg-green-500/50"></span>
                        </div>
                    </div>
                    <textarea id="hiddenClipboard" class="absolute -left-[9999px]"></textarea>
                    <div id="codeDisplay" class="flex-1 code-area p-8 overflow-auto text-sm text-blue-100/80 whitespace-pre-wrap">-- [[ AETHERIUS REAL-TIME API ]]
-- Masukkan perintah di kiri untuk mulai membangun.</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const apiKey = ""; // Disediakan oleh environment

        function addLog(msg) {
            const logArea = document.getElementById('logArea');
            const entry = document.createElement('div');
            entry.textContent = `> ${msg}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        async function generateWithGemini() {
            const prompt = document.getElementById('promptArea').value;
            const display = document.getElementById('codeDisplay');
            const genBtn = document.getElementById('genBtn');
            const statusLight = document.getElementById('status-light');
            const statusText = document.getElementById('status-text');

            if (!prompt) return;

            // UI State: Generating
            genBtn.classList.add('is-generating');
            statusLight.className = "w-2 h-2 bg-yellow-500 rounded-full animate-pulse";
            statusText.textContent = "Neural API: Thinking...";
            display.textContent = "-- [ COMMUNICATING WITH GOOGLE GEMINI... ]\n-- [ ARCHITECTING SCRIPT LOGIC... ]";
            addLog(`Requesting: ${prompt.substring(0, 20)}...`);

            const systemPrompt = "You are Aetherius AI, an expert Roblox Luau scripter. Generate only clean, functional, and well-commented Roblox Luau code based on the user request. Do not include markdown code blocks like ```lua, just the raw code. Start every script with a comment header '-- [[ Generated by Aetherius AI via Google Gemini ]]'";

            try {
                let responseText = "";
                let retries = 0;
                const maxRetries = 5;

                const callApi = async () => {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "-- Error: No content returned";
                };

                // Exponential Backoff
                while (retries < maxRetries) {
                    try {
                        responseText = await callApi();
                        break;
                    } catch (err) {
                        retries++;
                        if (retries === maxRetries) throw err;
                        await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                    }
                }

                display.textContent = responseText;
                addLog("Neural Build Complete.");
                statusLight.className = "w-2 h-2 bg-green-500 rounded-full";
                statusText.textContent = "Neural API: Ready";

            } catch (error) {
                display.textContent = "-- [[ ERROR: FAILED TO REACH NEURAL CORE ]]\n-- Silakan coba lagi dalam beberapa saat.";
                addLog("API Error: Connection failed.");
                statusLight.className = "w-2 h-2 bg-red-500 rounded-full";
                statusText.textContent = "Neural API: Offline";
            } finally {
                genBtn.classList.remove('is-generating');
            }
        }

        function copyScript() {
            const display = document.getElementById('codeDisplay');
            const hiddenInput = document.getElementById('hiddenClipboard');
            const toast = document.getElementById('toast');
            
            hiddenInput.value = display.innerText;
            hiddenInput.select();
            hiddenInput.setSelectionRange(0, 99999);
            
            try {
                document.execCommand('copy');
                toast.classList.remove('hidden');
                toast.classList.add('copy-success');
                setTimeout(() => { toast.classList.add('hidden'); }, 2000);
                addLog("Copy operation success.");
            } catch (err) {
                addLog("Copy operation failed.");
            }
        }
    </script>
</body>
</html>
